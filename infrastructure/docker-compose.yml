version: '3.9'
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: shopitt
      POSTGRES_USER: shopitt
      POSTGRES_PASSWORD: shopitt
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build:
      context: ..
      dockerfile: infrastructure/backend.Dockerfile
    env_file:
      - infrastructure/backend.env
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app/backend

  frontend:
    build:
      context: ..
      dockerfile: infrastructure/frontend.Dockerfile
    working_dir: /app/frontend
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]
    ports:
      - "5173:5173"
    volumes:
      - ../frontend:/app/frontend
    depends_on:
      - backend

volumes:
  pgdata: 